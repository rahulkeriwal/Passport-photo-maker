<!DOCTYPE html>
<html>
<head>
<title>AI Passport Photo Maker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
text-align:center;
}

/* Header */

.header{
padding:20px;
font-size:26px;
font-weight:bold;
color:#00f7ff;
text-shadow:0 0 15px #00f7ff;
}

/* Main Box */

.container{
margin:20px;
padding:25px;
background:#111;
border-radius:15px;
box-shadow:0 0 25px #00f7ff33;
}

/* Upload */

.upload-box{
border:2px dashed #00f7ff;
padding:30px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.upload-box:hover{
box-shadow:0 0 20px #00f7ff;
}

/* Buttons */

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
background:#111;
color:#00f7ff;
border:1px solid #00f7ff;
box-shadow:0 0 10px #00f7ff;
transition:0.3s;
}

button:hover{
background:#00f7ff;
color:black;
box-shadow:0 0 20px #00f7ff;
}

/* Preview */

.preview img{
max-width:280px;
margin-top:20px;
border-radius:12px;
box-shadow:0 0 20px #00f7ff;
}

/* Footer */

.footer{
margin-top:40px;
font-size:14px;
color:#aaa;
}

</style>

</head>

<body>

<div class="header">
AI Passport Photo Maker
</div>

<div class="container">

<div class="upload-box">
<input type="file" id="upload">
</div>

<br>

<button onclick="setBg('white')">White Background</button>
<button onclick="setBg('blue')">Blue Background</button>

<div class="preview">
<img id="preview">
</div>

<br>

<button onclick="downloadImage()">Download 4K Photo</button>

</div>

<div class="footer">
AI Powered Background Remover
</div>

<script>

let removedImage
let bgColor="white"

document.getElementById("upload").addEventListener("change",function(){

let file=this.files[0]

let formData=new FormData()

formData.append("image_file",file)

fetch("https://api.remove.bg/v1.0/removebg",{

method:"POST",

headers:{
"X-Api-Key":"wcHwgcRR8pWncmcvfHh27mka"
},

body:formData

})

.then(res=>res.blob())

.then(blob=>{

removedImage=new Image()

removedImage.src=URL.createObjectURL(blob)

removedImage.onload=function(){

renderImage()

}

})

})

function setBg(color){

bgColor=color

renderImage()

}

function renderImage(){

if(!removedImage) return

let canvas=document.createElement("canvas")

canvas.width=3840
canvas.height=3840

let ctx=canvas.getContext("2d")

if(bgColor=="white"){
ctx.fillStyle="white"
}

if(bgColor=="blue"){
ctx.fillStyle="#1e90ff"
}

ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.drawImage(removedImage,1000,800,1800,2200)

document.getElementById("preview").src=canvas.toDataURL()

window.finalImage=canvas

}

function downloadImage(){

let link=document.createElement("a")

link.download="passport-photo.png"

link.href=finalImage.toDataURL()

link.click()

}

</script>

</body>
</html>
